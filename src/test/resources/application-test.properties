# Konfiguracja testowa - używa bazy H2 in-memory zamiast PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - automatyczne tworzenie schematu na podstawie encji
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Wyłączamy wymaganie JWT_SECRET podczas testów
spring.security.user.name=test
spring.security.user.password=test

# JWT - stały klucz do testów
jwt.secret=test-secret-key-for-unit-tests-that-is-long-enough-for-hs256-algorithm
jwt.expiration=3600000

# Wyłączamy Flyway jeśli jest skonfigurowany
spring.flyway.enabled=false
