spring.application.name=School-Trips
server.port=8083

# Wymusza poprawne dzialanie HTTPS dla Swaggera za proxy
server.forward-headers-strategy=framework

# Baza danych - wartosci pobierane ze zmiennych srodowiskowych
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Klucz szyfrujący JWT - pobierany ze zmiennych środowiskowych
jwt.secret=${JWT_SECRET:ToJestBardzoTajnyKluczDoGenerowaniaTokenowJWTKoregoNiktNieZna123!}

# Integracja z Gemini AI
schooltrips.gemini.api-key=${GEMINI_API_KEY:}